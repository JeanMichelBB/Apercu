# Ingress — public via Cloudflare
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: apercu-ingress
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  rules:
    - host: apercu.sacenpapier.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: apercu-frontend
                port:
                  number: 80
    - host: apercuapi.sacenpapier.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: apercu-backend
                port:
                  number: 8000
