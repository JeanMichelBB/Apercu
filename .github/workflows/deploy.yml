name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - "first-look/**"
      - "fastapi-backend/**"
      - ".github/workflows/deploy.yml"

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./first-look
          platforms: linux/amd64,linux/arm64
          push: true
          tags: jeanmichelbb/ap-fe:latest
          build-args: VITE_APP_API_URL=${{ secrets.VITE_APP_API_URL }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Deploy frontend to k3s
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo kubectl rollout restart deployment/apercu-frontend
            sudo kubectl rollout status deployment/apercu-frontend --timeout=120s

  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./fastapi-backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: jeanmichelbb/ap-be:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Deploy backend to k3s
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo kubectl rollout restart deployment/apercu-backend
            sudo kubectl rollout status deployment/apercu-backend --timeout=120s
